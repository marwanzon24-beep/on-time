<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marwan App</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* LOGIN */
#login{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

input{
  margin:5px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#c79a3b;
  color:#fff;
}

/* APP */
#app{display:none}

.header{
  background:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.card{
  background:#fff;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

.tabs{
  display:flex;
  justify-content:space-around;
  background:#fff;
}

.tab{padding:10px;cursor:pointer}
.active{border-bottom:3px solid orange}

.section{display:none}
.show{display:block}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.prayers{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:5px;
}

.prayer{
  background:#eee;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.done{background:#c79a3b;color:#fff}

.purple{
  background:linear-gradient(135deg,#4b006e,#6d1fa1);
  color:#fff;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">
  <b>Marwan</b>
  <button onclick="logout()">Logout</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="openTab('tracker',this)">Tracker</div>
  <div class="tab" onclick="openTab('stats',this)">Stats</div>
  <div class="tab" onclick="openTab('behavior',this)">Behavior</div>
</div>

<!-- TRACKER -->
<div id="tracker" class="section show">

<div class="card">
  <h3>Prayers</h3>
  <div class="prayers">
    <div class="prayer" onclick="toggle(this,'fajr')">Fajr</div>
    <div class="prayer" onclick="toggle(this,'dhuhr')">Dhuhr</div>
    <div class="prayer" onclick="toggle(this,'asr')">Asr</div>
    <div class="prayer" onclick="toggle(this,'maghrib')">Maghrib</div>
    <div class="prayer" onclick="toggle(this,'isha')">Isha</div>
  </div>
</div>

</div>

<!-- STATS -->
<div id="stats" class="section">

<div class="grid">
  <div class="box"><h2 id="count">0</h2>Prayers</div>
  <div class="box"><h2 id="money">0</h2>EGP</div>
</div>

</div>

<!-- BEHAVIOR -->
<div id="behavior" class="section">
<div class="card purple">
  <h2 id="score">0%</h2>
</div>
</div>

</div>

<script>
let userDB = {username:"marwan",password:"2410"}

function login(){
  let u = document.getElementById("user").value
  let p = document.getElementById("pass").value

  if(u===userDB.username && p===userDB.password){
    localStorage.setItem("login","yes")
    document.getElementById("login").style.display="none"
    document.getElementById("app").style.display="block"
    load()
  }else{
    alert("Wrong!")
  }
}

function logout(){
  localStorage.clear()
  location.reload()
}

function openTab(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('show'))
  document.getElementById(id).classList.add('show')

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  el.classList.add('active')
}

function toggle(el,name){
  el.classList.toggle("done")

  let data = JSON.parse(localStorage.getItem("prayers")||"{}")
  data[name]=!data[name]
  localStorage.setItem("prayers",JSON.stringify(data))

  calc()
}

function calc(){
  let data = JSON.parse(localStorage.getItem("prayers")||"{}")
  let count = Object.values(data).filter(v=>v).length
  let money = count * 3
  let score = count * 20

  document.getElementById("count").innerText = count
  document.getElementById("money").innerText = money
  document.getElementById("score").innerText = score + "%"
}

function load(){
  let data = JSON.parse(localStorage.getItem("prayers")||"{}")

  document.querySelectorAll('.prayer').forEach(el=>{
    let name = el.innerText.toLowerCase()
    if(data[name]) el.classList.add("done")
  })

  calc()
}

if(localStorage.getItem("login")=="yes"){
  document.getElementById("login").style.display="none"
  document.getElementById("app").style.display="block"
  load()
}
</script>

</body>
</html>
